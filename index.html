<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:skyblue;
            font-family:"Times New Roman", serif;
            padding:20px;
        }

        .header{
            background:black;
            color:white;
            max-width:500px;
            margin:20px auto;
            padding:30px;
            text-align:center;
            border-radius:10px;
        }

        .header h1{
            font-size:40px;
            margin-bottom:20px;
            color: blueviolet;
        }

        .button-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:15px;
            max-width:500px;
            margin:20px auto;
        }

        .button-grid a{
            display:flex;
            justify-content:center;
            align-items:center;
            height:45px;
            background:blue;
            color:white;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
        }

        .button-grid a:hover{
            background:rgb(25,25,219);
        }

        @media (max-width:500px){
            .header h1{
                font-size:30px;
            }

            .button-grid{
                grid-template-columns:repeat(2,1fr);
                gap:10px;
            }

            .button-grid a{
                height:42px;
                font-size:14px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>LEARN HTML 1</h1>

        <a href="index.html" style="display:inline-block;background:blue;color:white;padding:10px 25px;border-radius:10px;text-decoration:none;">
            HOME
        </a>
    </div>

    <div class="button-grid">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>

        <a href="introduction.html">Introduction</a>

        <a href="elements.html">Elements</a>

        <a href="attributes.html">Attribute</a>
        <a href="coming-soon.html">More</a>
    </div>

</body>
</html>
